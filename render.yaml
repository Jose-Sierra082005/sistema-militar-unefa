# ==============================================================================
#  Render Blueprint — Sistema Militar UNEFA
#  Despliegue via contenedor Docker (PHP 8.4 + Apache + Laravel)
# ==============================================================================

services:
  - type: web
    name: sistema-militar-unefa
    env: docker
    plan: free
    # Render construye la imagen desde el Dockerfile en la raíz del repositorio
    dockerfilePath: ./Dockerfile
    branch: main
    envVars:
      - key: APP_NAME
        value: "Sistema Militar UNEFA"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: APP_KEY
        value: base64:t28xTzZ0OHlMZWNoMDh5Tzh5YjNhY2o3eW1xNHBnOHc=
      - key: APP_URL
        value: https://sistema-militar-unefa.onrender.com
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_DATABASE
        value: /var/www/html/database/database.sqlite
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: array
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      # -----------------------------------------------------------------------
      # IMPORTANTE: Las siguientes variables DEBEN configurarse manualmente
      # en el Dashboard de Render → Environment → Environment Variables.
      # NO las agregues aquí para evitar exponer secretos en el repositorio.
      # -----------------------------------------------------------------------
      # GOOGLE_CLIENT_ID      → Tu Client ID de Google OAuth
      # GOOGLE_CLIENT_SECRET  → Tu Client Secret de Google OAuth
      # GOOGLE_REDIRECT_URI   → https://sistema-militar-unefa.onrender.com/auth/google/callback
