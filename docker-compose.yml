# ==============================================================================
#  Docker Compose — SIAM (Entorno de Producción Local / Auto-recuperación)
# ==============================================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sistema-militar-app
    # -------------------------------------------------------------------------
    # POLÍTICA DE AUTO-RECUPERACIÓN (Self-Healing)
    # En caso de una falla crítica que tumbe el proceso de Apache o PHP,
    # Docker se encargará de reiniciar automáticamente el contenedor.
    # -------------------------------------------------------------------------
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - APP_NAME=SIAM
      - APP_ENV=production
      - APP_DEBUG=true
      - APP_KEY=base64:t28xTzZ0OHlMZWNoMDh5Tzh5YjNhY2o3eW1xNHBnOHc=
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - LOG_CHANNEL=stderr
      - LOG_LEVEL=debug
      - SESSION_DRIVER=cookie
      - CACHE_STORE=array
      - QUEUE_CONNECTION=sync
      - FILESYSTEM_DISK=local
      # NOTA: En producción, inyecte las credenciales reales de Google OAuth
      # - GOOGLE_CLIENT_ID=tu_client_id
      # - GOOGLE_CLIENT_SECRET=tu_client_secret
    volumes:
      - sqlite-data:/var/www/html/database
      - storage-data:/var/www/html/storage

volumes:
  sqlite-data:
  storage-data:
